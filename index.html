<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twatch - Stream Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-t">T</span>watch
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Search streams, games, creators...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link">Browse</a>
                <a href="#" class="nav-link">Categories</a>
                <button class="btn-login" id="loginBtn">Login</button>
                <button class="btn-signup" id="signupBtn">Sign Up</button>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Streamer Sidebar -->
        <aside class="streamer-sidebar">
            <div class="streamer-header">
                <h3>Featured Streamers</h3>
            </div>
            <ul class="streamer-list" id="streamerList">
                <!-- Streamers will be generated here -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Featured Stream Section -->
            <section class="featured-stream">
                <div class="stream-wrapper">
                    <!-- Video Player -->
                    <div class="video-player" id="videoPlayer">
                        <video id="mainPlayer" controls>
                            <source src="https://commondatastorage.googleapis.com/gtv-videos-library/sample/big_buck_bunny.mp4" type="video/mp4">
                        </video>
                        
                        <!-- Chat Overlay -->
                        <div class="chat-overlay" id="chatOverlay">
                            <div class="overlay-chat-messages" id="overlayChatMessages">
                                <!-- Chat messages appear here -->
                            </div>
                        </div>

                        <!-- Stream Info Overlay -->
                        <div class="stream-info-overlay">
                            <div class="game-info">
                                <span class="game-name" id="overlayGameName">Game Name</span>
                                <span class="game-progress" id="overlayGameProgress">0%</span>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Section -->
                    <section class="chat-section">
                        <div class="chat-header">
                            <h3>Chat</h3>
                            <button class="chat-settings"><i class="fas fa-cog"></i></button>
                        </div>
                        <div class="chat-messages" id="chatMessages">
                            <!-- Messages loaded here -->
                        </div>
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="Send a message...">
                            <button id="sendChat"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </section>
                </div>

                <!-- Stream Info Below Video -->
                <div class="stream-details">
                    <div class="streamer-info">
                        <img src="https://via.placeholder.com/50" alt="streamer" class="streamer-avatar">
                        <div class="streamer-details">
                            <h2 id="streamerName">Streamer Name</h2>
                            <p id="streamTitle">Playing Game</p>
                            <p class="stream-game-info" id="streamGameInfo">Game: Unknown</p>
                        </div>
                        <button class="btn-follow">Follow</button>
                    </div>
                    <p class="stream-description" id="streamDescription">
                        Welcome to the stream!
                    </p>
                </div>
            </section>
        </main>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login to Twatch</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="#" onclick="switchToSignup()">Sign Up</a></p>
        </div>
    </div>

    <!-- Signup Modal -->
    <div class="modal" id="signupModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Create Your Twatch Account</h2>
            <form id="signupForm">
                <input type="text" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <a href="#" onclick="switchToLogin()">Login</a></p>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/streams.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
